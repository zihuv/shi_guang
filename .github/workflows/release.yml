name: Release

permissions:
  contents: write
  pull-requests: read
  issues: read

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g: 0.0.1)"
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          check-latest: true
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev

      - name: Update version
        run: node scripts/update-version.cjs ${{ github.event.inputs.version }}

      - name: Generate release body from template
        id: release_body
        run: |
          # Use Node.js for cross-platform compatibility
          node -e "
            const fs = require('fs');
            const version = process.env.VERSION;
            const content = fs.readFileSync('.github/release_template.md', 'utf8')
              .replace(/VERSION/g, version);
            
            // Write to GITHUB_OUTPUT with proper multiline handling
            const fs = require('fs');
            const outputFile = process.env.GITHUB_OUTPUT;
            const delimiter = 'EOF_' + Math.random().toString(36).substring(7);
            
            fs.appendFileSync(outputFile, `body<<${delimiter}\n`);
            fs.appendFileSync(outputFile, `${content}\n`);
            fs.appendFileSync(outputFile, `${delimiter}\n`);
          "
        env:
          VERSION: ${{ github.event.inputs.version }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version }}
          releaseName: "${{ github.event.inputs.version }}"
          releaseBody: ${{ steps.release_body.outputs.body }}
