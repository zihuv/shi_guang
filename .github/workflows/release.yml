name: Release

run-name: Release ${{ inputs.version || github.ref_name }}

permissions:
  contents: write

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version. Must match package.json and the browser extension manifest."
        required: true
        type: string

concurrency:
  group: release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.prepare_release.outputs.version }}
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare release metadata
        id: prepare_release
        run: node scripts/prepare-release.cjs ${{ inputs.version || github.ref_name }}

      - name: Create or update draft release
        id: release
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.prepare_release.outputs.version }}
          RELEASE_BODY: ${{ steps.prepare_release.outputs.body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_VERSION;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let release;

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              release = existing.data;
              if (!release.draft) {
                core.setFailed(`Release ${tag} already exists and is not a draft.`);
                return;
              }

              release = (
                await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: release.id,
                  tag_name: tag,
                  name: tag,
                  body: process.env.RELEASE_BODY,
                  draft: true,
                  prerelease: false,
                  target_commitish: context.sha,
                })
              ).data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              release = (
                await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: tag,
                  name: tag,
                  body: process.env.RELEASE_BODY,
                  draft: true,
                  prerelease: false,
                  target_commitish: context.sha,
                })
              ).data;
            }

            core.setOutput("release_id", String(release.id));

  package_extension:
    name: Package browser extension
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create browser extension archive
        run: |
          mkdir -p dist
          git archive \
            --format=zip \
            --output="dist/shiguang-collector_${{ needs.prepare.outputs.version }}.zip" \
            HEAD:extensions/shiguang-collector

      - name: Upload browser extension asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          draft: true
          fail_on_unmatched_files: true
          files: dist/shiguang-collector_${{ needs.prepare.outputs.version }}.zip

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            platform: macos-15
            args: --mac --arm64
            files: release/*.dmg
          - name: Linux x64
            platform: ubuntu-22.04
            args: --linux --x64
            files: |
              release/*.AppImage
              release/*.deb
          - name: Windows x64
            platform: windows-2022
            args: --win --x64
            files: release/*.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Rebuild native dependencies
        run: npx electron-builder install-app-deps

      - name: Package Electron app
        run: npx electron-builder ${{ matrix.args }} --publish never

      - name: Verify packaged native dependencies
        run: node scripts/verify-package-native-deps.cjs "${{ runner.os }}"

      - name: Report packaged sizes
        run: node scripts/report-package-size.cjs release

      - name: Upload app assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          draft: true
          fail_on_unmatched_files: true
          files: ${{ matrix.files }}

  publish:
    name: Publish release
    needs: [prepare, package_extension, build]
    runs-on: ubuntu-22.04
    steps:
      - name: Publish draft release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number("${{ needs.prepare.outputs.release_id }}"),
              draft: false,
              prerelease: false,
            });
