name: Release

run-name: Release ${{ inputs.version || github.ref_name }}

permissions:
  contents: write

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version. Must match package.json and src-tauri/tauri.conf.json."
        required: true
        type: string

concurrency:
  group: release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.prepare_release.outputs.version }}
      release_id: ${{ steps.release.outputs.release_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Prepare release metadata
        id: prepare_release
        run: node scripts/prepare-release.cjs ${{ inputs.version || github.ref_name }}

      - name: Create or update draft release
        id: release
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.prepare_release.outputs.version }}
          RELEASE_BODY: ${{ steps.prepare_release.outputs.body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.RELEASE_VERSION;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let release;

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              release = existing.data;
              if (!release.draft) {
                core.setFailed(`Release ${tag} already exists and is not a draft.`);
                return;
              }

              release = (
                await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: release.id,
                  tag_name: tag,
                  name: tag,
                  body: process.env.RELEASE_BODY,
                  draft: true,
                  prerelease: false,
                  target_commitish: context.sha,
                })
              ).data;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              release = (
                await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: tag,
                  name: tag,
                  body: process.env.RELEASE_BODY,
                  draft: true,
                  prerelease: false,
                  target_commitish: context.sha,
                })
              ).data;
            }

            core.setOutput("release_id", String(release.id));

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS aarch64
            platform: macos-15
            args: --target aarch64-apple-darwin
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""
          - name: Windows x64
            platform: windows-2022
            args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install macOS target
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          tagName: ${{ needs.prepare.outputs.version }}
          releaseDraft: true
          retryAttempts: 2
          args: ${{ matrix.args }}

  publish:
    name: Publish release
    needs: [prepare, build]
    runs-on: ubuntu-22.04
    steps:
      - name: Publish draft release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number("${{ needs.prepare.outputs.release_id }}"),
              draft: false,
              prerelease: false,
            });
