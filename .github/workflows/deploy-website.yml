name: Deploy Website

permissions:
  contents: read
  pages: write
  id-token: write

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          check-latest: true
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build website
        run: pnpm run docs:build

      - name: Fix hydration warning - add suppressHydrationWarning to HTML
        run: |
          # Add suppressHydrationWarning to all HTML files
          for file in $(find website/.rspress/build -name "*.html"); do
            sed -i 's/<html lang="en">/<html lang="en" suppressHydrationWarning="true">/g' "$file"
          done

      - name: Create .nojekyll
        run: touch website/.rspress/build/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/.rspress/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
