<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拾光采集器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>拾光采集器</h1>
    </div>

    <div class="status-section">
      <div class="status-label">连接状态</div>
      <div class="status-indicator" id="connectionStatus">
        <span class="status-dot"></span>
        <span class="status-text">检查中...</span>
      </div>
    </div>

    <div class="stats-section">
      <div class="stat-item">
        <span class="stat-value" id="collectedCount">0</span>
        <span class="stat-label">已采集图片</span>
      </div>
    </div>

    <div class="info-section">
      <p>在浏览器中右键点击图片，选择 <strong>"发送到拾光"</strong> 即可采集。</p>
    </div>

    <div class="footer">
      <button id="refreshBtn" class="refresh-btn">刷新状态</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
