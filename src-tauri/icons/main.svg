<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- 白色背景 -->
  <rect width="512" height="512" fill="#FFFFFF"/>
  
  <!-- 太阳光芒（向内收缩） -->
  <g stroke="#F4C542" stroke-width="12" stroke-linecap="round">
    <line x1="256" y1="110" x2="256" y2="60"/>
    <line x1="256" y1="442" x2="256" y2="402"/>
    <line x1="110" y1="256" x2="60" y2="256"/>
    <line x1="442" y1="256" x2="402" y2="256"/>
    <line x1="150" y1="150" x2="115" y2="115"/>
    <line x1="362" y1="362" x2="397" y2="397"/>
    <line x1="150" y1="362" x2="115" y2="397"/>
    <line x1="362" y1="150" x2="397" y2="115"/>
  </g>
  
  <!-- 太阳主体 -->
  <circle cx="256" cy="256" r="100" fill="#F4C542"/>
  
  <!-- 笑脸 - 眼睛 -->
  <circle cx="220" cy="230" r="12" fill="#FFFFFF"/>
  <circle cx="292" cy="230" r="12" fill="#FFFFFF"/>
  
  <!-- 笑脸 - 嘴巴（更饱满的微笑） -->
  <path d="M 210 270 Q 256 310 302 270" stroke="#FFFFFF" stroke-width="10" fill="none" stroke-linecap="round"/>
  
  <!-- 腮红 -->
  <ellipse cx="190" cy="260" rx="15" ry="8" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="322" cy="260" rx="15" ry="8" fill="#FFB6C1" opacity="0.6"/>
</svg>